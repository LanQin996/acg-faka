#{include file="./Header.html"}
<main class="purelite-home">
    <section class="container purelite-page-space">
        <section class="purelite-query-hero">
            <div>
                <p class="purelite-section-kicker">ORDER LOOKUP</p>
                <h1 class="purelite-query-title">订单查询</h1>
                <p class="purelite-query-text">输入订单号或下单联系方式，快速查看支付状态和发货内容。</p>
            </div>

            <form class="order-query-form purelite-query-form">
                <div class="purelite-query-input">
                    <i class="fa-duotone fa-regular fa-search"></i>
                    <input type="text" class="form-control" name="keywords" value="#{$tradeNo}" placeholder="请输入订单号或联系方式">
                </div>
                <button type="submit" class="btn btn-primary btn-search-query">
                    <i class="fa-duotone fa-regular fa-magnifying-glass"></i>
                    查询订单
                </button>
            </form>
        </section>

        <div class="loading-state" style="display:none;">
            <div class="purelite-state-card">
                <i class="fa-duotone fa-regular fa-spinner-third icon-spin"></i>
                <h3>正在查询订单</h3>
                <p>系统正在检索你输入的订单信息，请稍候。</p>
            </div>
        </div>

        <div class="no-results" style="display:none;">
            <div class="purelite-state-card">
                <i class="fa-duotone fa-regular fa-circle-exclamation"></i>
                <h3>没有找到相关订单</h3>
                <p>请检查订单号或联系方式是否填写正确，如仍有问题可联系客服处理。</p>
            </div>
        </div>

        <div class="order-results" style="display:none;">
            <section class="purelite-results-wrap">
                <div class="purelite-section-head">
                    <div>
                        <p class="purelite-section-kicker">RESULT</p>
                        <h3>查询结果</h3>
                    </div>
                </div>
                <div class="order-list"></div>
            </section>
        </div>
    </section>
</main>
#{ready("/assets/user/controller/index/query.js?v=#{$app.version}-purelite-fix3")}
<script>ready("#{$static}/assets/query.js?v=#{$app.version}-purelite-query1");</script>
#{include file="./Footer.html"}
